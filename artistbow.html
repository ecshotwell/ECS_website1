<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Eric Shotwell, Artist Blacksmith</title>
    <!-- Link to your existing style sheet -->
    <link rel="stylesheet" href="style.css">
    <!-- Include PapaParse to easily read CSV files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
    /* Portfolio Grid and Layout Styling */
    .portfolio-section { padding: 20px; max-width: 1200px; margin: 0 auto; }
    .filter-group { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; background: #f4f4f4; padding: 15px; border-radius: 5px; }
    .filter-item { display: flex; flex-direction: column; min-width: 150px; }
    .filter-item label { font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
    .filter-item select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: white; }
    
    /* Main Gallery Grid Settings */
    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
    .gallery-card { border: 1px solid #ddd; border-radius: 6px; overflow: hidden; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s; cursor: pointer; display: flex; flex-direction: column; }
    .gallery-card:hover { transform: translateY(-3px); }
    .gallery-card img { width: 100%; height: 200px; object-fit: cover; display: block; }
    
    .gallery-info { padding: 15px; }
    .gallery-info h3 { margin: 0 0 8px 0; font-size: 1.1rem; }
    .gallery-info p { margin: 4px 0; font-size: 0.85rem; color: #555; }
    .gallery-info strong { color: #222; }
    .no-results { grid-column: 1 / -1; text-align: center; padding: 40px; color: #777; font-style: italic; }

    /* --- LIGHTBOX (POP-UP) STYLING --- */
    .lightbox-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
    
    .lightbox-content { 
        background: #fff; 
        max-width: 900px; 
        width: 100%; 
        max-height: 90vh; 
        border-radius: 8px; 
        overflow: hidden; /* Stops the popup wrapper from scrolling */
        display: flex; 
        flex-direction: column; 
        position: relative; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
    }
    
    .lightbox-close { position: absolute; top: 15px; right: 20px; font-size: 35px; font-weight: bold; color: #fff; cursor: pointer; background: rgba(0,0,0,0.6); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; line-height: 1; z-index: 1010; transition: background 0.2s; }
    .lightbox-close:hover { background: #000; }
    
    .lightbox-body { 
        display: flex; 
        flex-direction: column; 
        min-height: 0; /* Allows the image wrapper to shrink to give text room */
    }
    
    .lightbox-img-container { 
        width: 100%; 
        background: #111; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        padding: 10px 0; 
        min-height: 0; 
    }
    
    #lightbox-img { 
        max-width: 100%; 
        max-height: 100%; /* Dynamically fills whatever space text doesn't steal */
        object-fit: contain; 
        display: block; 
        margin: 0 auto; 
    }
    
    .lightbox-details { 
        padding: 25px 30px; 
        background: #fff; 
        flex-shrink: 0; /* Ensures the text description never cuts off or squishes */
    }
    
    .lightbox-details h2 { 
        margin-top: 0; 
        font-size: 1.6rem; 
        border-bottom: 2px solid #eee; 
        padding-bottom: 8px; 
        margin-bottom: 15px; 
    }
    
    .lightbox-details p { 
        font-size: 1rem; 
        margin: 6px 0; 
        color: #444; 
    }
</style>
</head>
<body>

   <header class="hero-container">
  <h1>Eric Shotwell, Artist Blacksmith</h1>
  <img src="./imgfiles/candle.jpg" alt="Forged Candle Holder">
  
 <nav class="top-nav-bar">
  <a href="./index.html">Home</a>
  <a href="./artistbow.html">Art Portfolio</a>
  <a href="./vision.html">Vision</a>
  <a href="./professionalfocus.html">Focus</a>
  <a href="./contact.html">Contact</a>
</nav>
</header>

    <main class="portfolio-section">
        <h2>Artwork Portfolio</h2>
        <p>Use the filters below to browse through my work. Click any image to view it larger.</p>

        <!-- Filters Section -->
        <div class="filter-group">
            <div class="filter-item">
                <label for="filter-subject">Subject</label>
                <select id="filter-subject" onchange="filterGallery()"><option value="all">All Subjects</option></select>
            </div>
            <div class="filter-item">
                <label for="filter-medium">Medium</label>
                <select id="filter-medium" onchange="filterGallery()"><option value="all">All Media</option></select>
            </div>
            <div class="filter-item">
                <label for="filter-location">Location</label>
                <select id="filter-location" onchange="filterGallery()"><option value="all">All Locations</option></select>
            </div>
            <div class="filter-item">
                <label for="filter-category">Category</label>
                <select id="filter-category" onchange="filterGallery()"><option value="all">All Categories</option></select>
            </div>
            <div class="filter-item">
                <label for="filter-artist">Artist</label>
                <select id="filter-artist" onchange="filterGallery()"><option value="all">All Categories</option></select>
            </div>
        </div>

        <!-- Dynamic Gallery Grid -->
        <div id="portfolio-grid" class="portfolio-grid">
            <p>Loading gallery items...</p>
        </div>
    </main>

    <!-- --- LIGHTBOX POP-UP STRUCTURAL LAYOUT --- -->
    <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox(event)">
        <span class="lightbox-close" onclick="closeLightbox(event)">&times;</span>
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <div class="lightbox-body">
                <div class="lightbox-img-container">
                    <img id="lightbox-img" src="./imgfiles/ecs-art/" alt="missing image">
                </div>
                <div class="lightbox-details">
                    <h2 id="lightbox-title"></h2>
                    <p><strong>Medium:</strong> <span id="lightbox-medium"></span></p>
                    <p><strong>Location:</strong> <span id="lightbox-location"></span></p>
                    <p><strong>Category:</strong> <span id="lightbox-category"></span></p>
                    <p><strong>Artist:</strong> <span id="lightbox-artist"></span></p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p class="copyright">© 2026 Eric Shotwell. All rights reserved.</p>
    </footer>
</body>
    <script>
    let masterGalleryData = [];

    // 1. Fetch and Parse CSV File
    Papa.parse("images.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            masterGalleryData = results.data;
            populateFilterDropdowns(masterGalleryData);
            displayGallery(masterGalleryData);
        },
        error: function(err) {
            document.getElementById('portfolio-grid').innerHTML = '<p class="no-results">Error loading portfolio data. Please ensure images.csv exists.</p>';
            console.error(err);
        }
    });

    // 2. Dynamically extract unique values for dropdown filters
function populateFilterDropdowns(data) {
    const attributes = ['subject', 'medium', 'location', 'category', 'artist'];
    attributes.forEach(attr => {
        const selectElement = document.getElementById(`filter-${attr}`);
        
        // FIX: Match lowercase attribute OR capitalized fallback item mapping (e.g., item['artist'] || item['Artist'])
        const capitalizedAttr = attr.charAt(0).toUpperCase() + attr.slice(1);
        const uniqueValues = [...new Set(data.map(item => {
            const val = item[attr] || item[capitalizedAttr];
            return val ? val.trim() : null;
        }).filter(Boolean))].sort();
        
        uniqueValues.forEach(value => {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = value;
            selectElement.appendChild(option);
        });
    });
}

    // 3. Render gallery grid cards
    function displayGallery(items) {
        const grid = document.getElementById('portfolio-grid');
        grid.innerHTML = '';
        
        if (items.length === 0) {
            grid.innerHTML = '<div class="no-results">No items match your chosen filter criteria.</div>';
            return;
        }
        
        items.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'gallery-card';
            let filename = item.filename.trim();
            const imgPath = filename.startsWith('imgfiles/ecs-art/') ? `./${filename}` : `./imgfiles/ecs-art/${filename}`;
            card.innerHTML = `
                <img src="${imgPath}" alt="${item.subject || 'Blacksmith Artwork'}" loading="lazy">
                <div class="gallery-info">
                    <h3>${item.subject || 'Untitled'}</h3>
                    <p><strong>Medium:</strong> ${item.medium || 'N/A'}</p>
                    <p><strong>Location:</strong> ${item.location || 'N/A'}</p>
                    <p><strong>Category:</strong> ${item.category || 'N/A'}</p>
                    <p><strong>Artist:</strong> ${item.artist || 'N/A'}</p>
                </div>
            `;
            // Add click event listener to trigger the lightbox pop-up
            card.addEventListener('click', () => openLightbox(item));
            grid.appendChild(card);
        });
    }

    // 4. Filter gallery calculation
function filterGallery() {
    const subjectFilter = document.getElementById('filter-subject').value;
    const mediumFilter = document.getElementById('filter-medium').value;
    const locationFilter = document.getElementById('filter-location').value;
    const categoryFilter = document.getElementById('filter-category').value;
    const artistFilter = document.getElementById('filter-artist').value;
    
    const filteredResults = masterGalleryData.filter(item => {
        // Fallbacks added to catch both 'artist' and 'Artist' data records
        const matchSubject = (subjectFilter === 'all' || (item.subject || item.Subject)?.trim() === subjectFilter);
        const matchMedium = (mediumFilter === 'all' || (item.medium || item.Medium)?.trim() === mediumFilter);
        const matchLocation = (locationFilter === 'all' || (item.location || item.Location)?.trim() === locationFilter);
        const matchCategory = (categoryFilter === 'all' || (item.category || item.Category)?.trim() === categoryFilter);
        const matchArtist = (artistFilter === 'all' || (item.artist || item.Artist)?.trim() === artistFilter);
        
        return matchSubject && matchMedium && matchLocation && matchCategory && matchArtist;
    });
displayGallery(filteredResults);
}
    // --- LIGHTBOX INTERACTION FUNCTIONS ---

    // Open Lightbox Pop-up
    function openLightbox(item) {
        // FIXED: Added missing backticks around template literal path
       const imgPath = `./imgfiles/ecs-art/${item.filename.trim()}`;
        
        document.getElementById('lightbox-img').src = imgPath;
        document.getElementById('lightbox-img').alt = item.subject || 'Blacksmith Artwork';
        document.getElementById('lightbox-title').textContent = item.subject || 'Untitled';
        document.getElementById('lightbox-medium').textContent = item.medium || 'N/A';
        document.getElementById('lightbox-location').textContent = item.location || 'N/A';
        document.getElementById('lightbox-category').textContent = item.category || 'N/A';
        document.getElementById('lightbox-artist').textContent = item.artist || 'N/A';
        
        document.getElementById('lightbox').style.display = 'flex';
        // Stop page background scrolling while viewing lightbox
        document.body.style.overflow = 'hidden';
    }

    // Close Lightbox Pop-up
    function closeLightbox(event) {
        // FIXED: Safely prevent click event bubbles from breaking code execution
        if (event && event.stopPropagation) {
            event.stopPropagation();
        }
        document.getElementById('lightbox').style.display = 'none';
        // Restore normal background scrolling
        document.body.style.overflow = 'auto';
    }

    // OPTIONAL BONUS: Close lightbox if the user hits the Escape key
    window.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            closeLightbox();
        }
    });
</script>
</html>
